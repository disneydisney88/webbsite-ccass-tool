name: Keep API awake

# Render free tier spins the service down after ~15 minutes without EXTERNAL
# traffic (Render's own internal health checks do not count). This pings the
# public /health endpoint every 10 minutes during Hong Kong waking hours
# (06:00-23:50 HKT) so MCP/API calls don't hit a cold start.
#
# Why not 24/7: the free tier includes 750 instance-hours/month; keeping one
# service awake around the clock (~730h) leaves no headroom. ~18h/day uses
# ~540h/month. Widen the cron if you upgrade the plan.
#
# Note: GitHub disables scheduled workflows after 60 days without repo
# activity - a push or a manual "Run workflow" re-enables it.

on:
  schedule:
    # UTC times; 22:00-23:50 + 00:00-15:50 UTC = 06:00-23:50 HKT
    - cron: "*/10 22-23 * * *"
    - cron: "*/10 0-15 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /health
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 40 https://webbsite-ccass-api.onrender.com/health || echo 000)
            echo "attempt $i -> HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 20
          done
          echo "health did not return 200 after 3 attempts (cold start or outage)"
          exit 1
