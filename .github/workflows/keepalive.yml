name: Keep API awake

# Render free tier spins the service down after ~15 minutes without EXTERNAL
# traffic (Render's own internal health checks do not count). This pings the
# public /health endpoint every 10 minutes during 08:00-12:00 HKT so MCP/API
# calls in that window don't hit a cold start. ~4h/day uses ~120h/month of the
# free tier's 750 instance-hours. Widen the cron if usage hours change.
#
# Note: GitHub disables scheduled workflows after 60 days without repo
# activity - a push or a manual "Run workflow" re-enables it.

on:
  schedule:
    # UTC times; 00:00-03:50 UTC = 08:00-11:50 HKT
    - cron: "*/10 0-3 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /health
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 40 https://webbsite-ccass-api.onrender.com/health || echo 000)
            echo "attempt $i -> HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 20
          done
          echo "health did not return 200 after 3 attempts (cold start or outage)"
          exit 1
